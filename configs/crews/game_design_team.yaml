id: game_design_team
name: Game Design Team Crew
process: sequential
knowledge_files:
  - knowledge/game_design_team/project_brief.md
memory: false
agents:
  - game_concept_generator
  - game_fantasy_designer
  - game_innovation_designer
  - game_market_validator
  - game_design_director
tasks:
  - id: generate_game_concept
    agent: game_concept_generator
    description: >
      입력 요구사항 `{user_request}`를 바탕으로 장르, 핵심 테마, 기본적인 게임 플레이 루프,
      플레이어 동기를 포함한 게임 컨셉 초안을 만든다.
    expected_output: >
      게임 컨셉 초안이 담긴 Markdown 문서.
    output_artifact: concept.md
  - id: define_player_fantasy
    agent: game_fantasy_designer
    context_tasks:
      - generate_game_concept
    description: >
      입력 요구사항 `{user_request}`와 앞선 게임 컨셉을 바탕으로 플레이어 정체성, 존재감,
      감정 판타지를 정의한다.
    expected_output: >
      플레이어 판타지와 정체성이 담긴 Markdown 문서.
    output_artifact: fantasy.md
  - id: design_unique_hook
    agent: game_innovation_designer
    context_tasks:
      - generate_game_concept
      - define_player_fantasy
    description: >
      입력 요구사항 `{user_request}`와 앞선 기획 결과를 바탕으로 차별화 메커니즘, 시스템 상호작용,
      새로운 플레이 경험을 정의한다.
    expected_output: >
      unique hook과 혁신 포인트가 담긴 Markdown 문서.
    output_artifact: innovation.md
  - id: validate_market_fit
    agent: game_market_validator
    context_tasks:
      - generate_game_concept
      - design_unique_hook
    description: >
      입력 요구사항 `{user_request}`와 앞선 기획 결과를 시장 관점에서 평가한다.
      타겟 유저, 장르 트렌드, 비교작, 상업적 가능성, 개선 방향을 정리한다.
      오늘 날짜는 `{current_date}`다.
    expected_output: >
      시장성 검토와 개선 제안이 담긴 Markdown 문서.
    output_artifact: market_validation.md
  - id: synthesize_game_direction
    agent: game_design_director
    context_tasks:
      - generate_game_concept
      - define_player_fantasy
      - design_unique_hook
      - validate_market_fit
    description: >
      입력 요구사항 `{user_request}`와 앞선 4개 결과를 종합해 팀 최종 결론을 만든다.
      게임 한 줄 정의, 핵심 플레이어 판타지, unique hook, 핵심 시스템 방향성,
      핵심 콘텐츠 방향성, 시장성 관점 보정 포인트, 다음 기획 단계 제안을 포함한다.
    expected_output: >
      최종 게임 방향성과 다음 단계 제안이 담긴 Markdown 문서.
    output_artifact: game_design_direction.md
output_policy:
  save_markdown: true
  include_metadata: true
